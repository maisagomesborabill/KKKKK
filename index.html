DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cardápio Digital</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffd6e7,#d9f0ff);
    font-family:'Poppins', sans-serif;
}

/* animação de abrir */
@keyframes abrirCardapio{
    0%{
        transform:scaleY(0) scaleX(0.9);
        opacity:0;
    }
    60%{
        transform:scaleY(1.05) scaleX(1);
    }
    100%{
        transform:scaleY(1);
        opacity:1;
    }
}

.cardapio{
    background:white;
    width:90%;
    max-width:380px;
    padding:28px;
    border-radius:22px;
    box-shadow:0 18px 45px rgba(0,0,0,0.25);
    text-align:center;
    border:3px solid #ff9acb;
    animation:abrirCardapio 0.8s ease forwards;
    transform-origin:top;
}

h1{
    margin:0;
    font-size:clamp(24px, 6vw, 30px);
    color:#ff4da6;
}

.sub{
    margin-top:6px;
    margin-bottom:22px;
    color:#555;
    font-weight:500;
    font-size:clamp(14px, 4vw, 16px);
}

.item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:14px;
    margin:10px 0;
    border-radius:14px;
    background:#fff0f7;
}

.nome{
    font-weight:500;
    font-size:clamp(14px, 4vw, 16px);
}

.preco{
    font-weight:700;
    font-size:clamp(14px, 4vw, 16px);
    color:#ff4da6;
}

/* toque mobile */
.item:active{
    background:#ffe3f1;
    transform:scale(0.98);
}

.rodape{
    margin-top:22px;
    font-size:12px;
    color:#888;
}

/* ajustes extras p telas muito pequenas */
@media (max-width:360px){
    .cardapio{
        padding:22px;
    }
}

</style>
</head>

<body>

<div class="cardapio">

<h1>CARDÁPIO DIGITAL</h1>
<div class="sub">Restaurante Sigma</div>

<div class="item">
<span class="nome">Comida fofinha</span>
<span class="preco">R$12,99</span>
</div>

<div class="item">
<span class="nome">Comida cute cute</span>
<span class="preco">R$19,99</span>
</div>

<div class="item">
<span class="nome">Tralalero tralala frito</span>
<span class="preco">R$29,99</span>
</div>

<div class="item">
<span class="nome">Picanha cozida (kg)</span>
<span class="preco">R$99,99</span>
</div>

<div class="rodape">feito por Maisa dev suprema</div>

</div>

</body>
</html>
