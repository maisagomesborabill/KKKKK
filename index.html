<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cardápio</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffd1e6,#c9e7ff);
    font-family: 'Segoe UI', sans-serif;
}

.cardapio{
    background:white;
    width:90%;
    max-width:360px;
    padding:25px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,0.2);
    text-align:center;
    border:3px solid #ff9acb;
    animation:abrir .7s ease;
}

@keyframes abrir{
    from{transform:scale(.6);opacity:0}
    to{transform:scale(1);opacity:1}
}

h1{
    color:#ff4fa3;
    margin:0;
}

h2{
    margin-top:5px;
    color:#666;
    font-weight:normal;
}

.item{
    background:#ffeaf4;
    margin:12px 0;
    padding:12px;
    border-radius:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.item button{
    border:none;
    background:#ff7ab6;
    color:white;
    font-size:18px;
    width:30px;
    height:30px;
    border-radius:8px;
}

.qtd{
    margin:0 8px;
    font-weight:bold;
}

.total{
    margin-top:15px;
    font-size:20px;
    font-weight:bold;
}

input{
    width:80%;
    padding:8px;
    border-radius:10px;
    border:2px solid #ff9acb;
    text-align:center;
    margin-top:10px;
}

.pedir{
    margin-top:15px;
    background:#25d366;
    color:white;
    border:none;
    padding:12px 20px;
    font-size:16px;
    border-radius:12px;
}
</style>
</head>
<body>

<div class="cardapio">

<h1>CARDÁPIO</h1>
<h2>Restaurante Sigma</h2>

<input id="mesa" placeholder="Número da mesa">

<div class="item">
<span>Comida fofinha</span>
<div>
<button onclick="alt(0,-1)">−</button>
<span class="qtd" id="q0">0</span>
<button onclick="alt(0,1)">+</button>
</div>
</div>

<div class="item">
<span>Comida cute cute</span>
<div>
<button onclick="alt(1,-1)">−</button>
<span class="qtd" id="q1">0</span>
<button onclick="alt(1,1)">+</button>
</div>
</div>

<div class="item">
<span>Tralalero frito</span>
<div>
<button onclick="alt(2,-1)">−</button>
<span class="qtd" id="q2">0</span>
<button onclick="alt(2,1)">+</button>
</div>
</div>

<div class="item">
<span>Picanha (kg)</span>
<div>
<button onclick="alt(3,-1)">−</button>
<span class="qtd" id="q3">0</span>
<button onclick="alt(3,1)">+</button>
</div>
</div>

<div class="total">
Total: R$ <span id="total">0.00</span>
</div>

<button class="pedir" onclick="pedir()">Pedir no WhatsApp</button>

</div>

<script>
let precos=[12.99,19.99,29.99,99.99]
let qtd=[0,0,0,0]

function alt(i,v){
    qtd[i]+=v
    if(qtd[i]<0)qtd[i]=0
    document.getElementById("q"+i).innerText=qtd[i]
    calcular()
}

function calcular(){
    let t=0
    for(let i=0;i<precos.length;i++)
        t+=precos[i]*qtd[i]
    document.getElementById("total").innerText=t.toFixed(2)
}

function pedir(){
    let mesa=document.getElementById("mesa").value
    if(!mesa) return alert("digite o número da mesa")

    let msg=`Pedido - Mesa ${mesa}%0A`

    let nomes=[
    "Comida fofinha",
    "Comida cute cute",
    "Tralalero frito",
    "Picanha"
    ]

    for(let i=0;i<qtd.length;i++){
        if(qtd[i]>0)
        msg+=`${nomes[i]} x${qtd[i]}%0A`
    }

    msg+=`Total: R$ ${document.getElementById("total").innerText}`

    window.open(`https://wa.me/554799513861?text=${msg}`)
}
</script>

</body>
</html>
