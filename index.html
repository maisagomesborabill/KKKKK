<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cardápio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffd6e7,#d9f0ff);
    font-family:'Poppins', sans-serif;
}

.cardapio{
    background:white;
    width:90%;
    max-width:400px;
    padding:25px;
    border-radius:22px;
    box-shadow:0 18px 45px rgba(0,0,0,0.25);
    text-align:center;
    border:3px solid #ff9acb;
    animation:abrir 0.7s ease;
}

@keyframes abrir{
    from{transform:scale(0.8);opacity:0;}
    to{transform:scale(1);opacity:1;}
}

h1{
    margin:0;
    color:#ff4da6;
}

.sub{
    margin-bottom:20px;
    color:#555;
}

.item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#fff0f7;
    padding:12px;
    margin:8px 0;
    border-radius:14px;
}

label{
    flex:1;
    text-align:left;
    cursor:pointer;
}

.preco{
    font-weight:bold;
    margin-right:10px;
    color:#ff4da6;
}

input{
    transform:scale(1.2);
    cursor:pointer;
}

.total{
    margin-top:20px;
    font-size:18px;
    font-weight:bold;
}

button{
    margin-top:15px;
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    font-size:16px;
    font-weight:bold;
    background:#ff4da6;
    color:white;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    background:#ff2d96;
}
</style>
</head>

<body>

<div class="cardapio">

<h1>CARDÁPIO</h1>
<div class="sub">Restaurante Sigma</div>

<div class="item">
<label>Comida fofinha</label>
<span class="preco">12.99</span>
<input type="checkbox" value="12.99" onchange="calc()">
</div>

<div class="item">
<label>Comida cute cute</label>
<span class="preco">19.99</span>
<input type="checkbox" value="19.99" onchange="calc()">
</div>

<div class="item">
<label>Tralalero tralala frito</label>
<span class="preco">29.99</span>
<input type="checkbox" value="29.99" onchange="calc()">
</div>

<div class="item">
<label>Picanha cozida (kg)</label>
<span class="preco">99.99</span>
<input type="checkbox" value="99.99" onchange="calc()">
</div>

<div class="total">
Total: R$ <span id="total">0.00</span>
</div>

<button onclick="pedir()">Pedir</button>

</div>

<script>
function calc(){
    let total = 0;
    document.querySelectorAll("input:checked").forEach(e=>{
        total += parseFloat(e.value);
    });
    document.getElementById("total").innerText = total.toFixed(2);
}

function pedir(){
    let itens = [];
    document.querySelectorAll("input:checked").forEach(e=>{
        itens.push(e.parentElement.innerText.trim());
    });

    if(itens.length===0){
        alert("Escolha algo primeiro 😡");
    }else{
        alert("Pedido feito:\n\n"+itens.join("\n"));
    }
}
</script>

</body>
</html>
